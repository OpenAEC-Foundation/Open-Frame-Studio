<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFS AR Preview</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #111; color: #e5e5e5; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1a1a2e; padding: 12px 16px; text-align: center; border-bottom: 2px solid #D97706; }
        .header h1 { font-size: 16px; color: #D97706; }
        model-viewer { flex: 1; width: 100%; min-height: 60vh; background: #0a0a1a; --poster-color: transparent; }
        .info { padding: 16px; background: #1a1a2e; }
        .info h2 { font-size: 14px; color: #D97706; margin-bottom: 8px; }
        .info p { font-size: 12px; color: #888; line-height: 1.6; }
        .ar-btn { display: block; width: calc(100% - 32px); margin: 16px; padding: 14px; background: #D97706; color: #111; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>AR Preview — Open Frame Studio</h1>
    </div>

    <model-viewer
        id="viewer"
        alt="Kozijn 3D preview"
        shadow-intensity="1"
        camera-controls
        touch-action="pan-y"
        auto-rotate
        ar
        ar-modes="webxr scene-viewer quick-look"
        poster=""
    >
        <button slot="ar-button" class="ar-btn">
            Bekijk in AR
        </button>
    </model-viewer>

    <div class="info">
        <h2>Kozijn K01</h2>
        <p>
            Draaikiepraam 1200x1500mm<br>
            Materiaal: Meranti 67x114mm<br>
            Beglazing: HR++ 4-16-4 (Ug 1.0)<br>
            Kleur: RAL 9010 / RAL 9010
        </p>
        <p style="margin-top:8px; font-style:italic">
            Laad een .glb bestand via de URL parameter: ?model=pad/naar/kozijn.glb
        </p>
    </div>

    <script>
        // Load model from URL parameter
        var params = new URLSearchParams(window.location.search);
        var modelUrl = params.get('model');
        if (modelUrl) {
            document.getElementById('viewer').setAttribute('src', modelUrl);
        }
    </script>
</body>
</html>
